<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Dokumenten-Übersicht</title>
</head>

<body>
    <h1>Verzeichnis-Inhalt</h1>
    <ul id="dateiliste">Lade Dateien...</ul>

    <script>
        const user = 'h-fahle';
        const repo = 'h-fahle.github.io';
        const pfad = 'DOKUMENTEN_ORDNER'; // Hier Ihren echten Ordnernamen eintragen

        // Hier ist der neu angepasste fetch-Befehl:
        fetch(`https://github.com{user}/${repo}/contents/${pfad}`, {
            method: 'GET',
            mode: 'cors',
            headers: {
                'Accept': 'application/vnd.github.v3+json'
            }
        })
            // Ab hier bleibt alles genau wie vorher:
            .then(response => response.json())
            .then(data => {
                const liste = document.getElementById('dateiliste');
                liste.innerHTML = '';

                data.forEach(datei => {
                    if (datei.type === 'file' && !datei.name.startsWith('.')) {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${datei.name}">${datei.name}</a>`;
                        liste.appendChild(li);
                    }
                });
            })
            .catch(err => console.error('Fehler beim Laden:', err));
    </script>
</body>

</html>
